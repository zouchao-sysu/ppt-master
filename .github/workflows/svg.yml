name: Generate SVG

on:
  workflow_dispatch:   # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run script
        run: |
          chmod +x generate_svg.sh
          ./generate_svg.sh

      - name: Upload SVGs
        uses: actions/upload-artifact@v4
        with:
          name: svg-output
          path: svg_output/
